server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        return 444;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name koenflow.com www.koenflow.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        return 301 https://koenflow.com$request_uri;
    }
}

server {
    listen 443 ssl http2 default_server;
    listen [::]:443 ssl http2 default_server;
    server_name _;

    ssl_certificate /etc/letsencrypt/live/koenflow.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/koenflow.com/privkey.pem;
    include /etc/nginx/snippets/koen-ssl-params.conf;

    return 444;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name keonflow.com www.keonflow.com;

    ssl_certificate /etc/letsencrypt/live/koenflow.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/koenflow.com/privkey.pem;
    include /etc/nginx/snippets/koen-ssl-params.conf;

    return 444;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.koenflow.com;

    ssl_certificate /etc/letsencrypt/live/koenflow.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/koenflow.com/privkey.pem;
    include /etc/nginx/snippets/koen-ssl-params.conf;

    return 301 https://koenflow.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name koenflow.com;

    client_max_body_size 32m;

    ssl_certificate /etc/letsencrypt/live/koenflow.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/koenflow.com/privkey.pem;
    include /etc/nginx/snippets/koen-ssl-params.conf;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Launcher binaries served straight from disk (existing folder)
    location /downloads/ {
        alias /var/www/keonflow-downloads/;
        expires 5m;
        add_header Cache-Control "public, max-age=300" always;
        try_files $uri =404;
    }

    # Everything else -> the new Next.js app (PM2 on 127.0.0.1:4311)
    location / {
        proxy_pass http://127.0.0.1:4311;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
